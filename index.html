<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceBack - Find Your Lost Items</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container-main {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .btn-group-custom {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-custom {
            padding: 12px 40px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            font-weight: 600;
        }
        
        .btn-login {
            background-color: #667eea;
            color: white;
        }
        
        .btn-login:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-register {
            background-color: #764ba2;
            color: white;
        }
        
        .btn-register:hover {
            background-color: #65408a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .features {
            margin-top: 50px;
            text-align: left;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: #555;
        }
        
        .feature-icon {
            font-size: 24px;
            margin-right: 15px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="logo">🔍</div>
        <h1>TraceBack</h1>
        <p class="subtitle">Find Your Lost Items Easily</p>
        
        <div class="btn-group-custom">
            <button class="btn-custom btn-login" onclick="window.location.href='login.php'">Login</button>
            <button class="btn-custom btn-register" onclick="window.location.href='register.php'">Register</button>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Report lost items with photos and details</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Browse found items in your area</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Connect with other users</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Get notifications on matches</span>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
